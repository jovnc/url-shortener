# For local development only. This file is not used in production.
services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 3

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  mockpass:
    build:
      context: ./docker/mockpass
    ports:
      - "5156:5156"
    environment:
      PORT: 5156
      SHOW_LOGIN_PAGE: "true"
      FAPI_CLIENT_JWKS_ENDPOINT: "http://host.docker.internal:3000/.well-known/jwks.json"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
